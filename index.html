<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Snowboard 1990s - 2000s</title>
    <style>
        /* Global Styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            text-align: center;
            padding: 20px;
            background-color: #3e8e41;
            color: white;
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 1px;
            width: 100%;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .gallery-item {
            text-align: center;
            width: 220px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            max-width: 220px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .gallery-item h3 {
            margin-top: 10px;
            font-size: 1.1em;
        }

        /* Lightbox Styles */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            padding-top: 60px;
            overflow: auto;
            text-align: center;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 80%;
            margin: auto;
        }

        .lightbox-content img {
            width: 100%;
            height: auto;
        }

        .lightbox-title {
            font-size: 1.5em;
            color: white;
            padding-top: 15px;
            text-align: center;
        }

        .close {
            color: white;
            font-size: 36px;
            font-weight: bold;
            position: absolute;
            top: 10px;
            right: 25px;
            background-color: transparent;
            border: none;
            cursor: pointer;
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            .gallery-item {
                width: 45%;
            }

            h1 {
                font-size: 2em;
            }
        }

        @media (max-width: 480px) {
            .gallery-item {
                width: 100%;
            }

            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>

    <h1>Vintage Snowboard 1990s - 2000s</h1>

    <div class="gallery">
        <!-- Burton Section -->
        <div class="gallery-item" onclick="openLightbox('burton_air_5_1.jpeg', 'Burton Air 5.1 - 1992')">
            <img src="burton_air_5_1.jpeg" alt="Burton Air 5.1" title="Burton Air 5.1 - 1992">
            <h3>Burton Air 5.1 - 1992</h3>
        </div>
        <div class="gallery-item" onclick="openLightbox('burton_air_asym_6.jpeg', 'Burton Air Asym 6 - 1994')">
            <img src="burton_air_asym_6.jpeg" alt="Burton Air Asym 6" title="Burton Air Asym 6 - 1994">
            <h3>Burton Air Asym 6 - 1994</h3>
        </div>
        <div class="gallery-item" onclick="openLightbox('burton_custom_1997.jpeg', 'Burton Custom 1997')">
            <img src="burton_custom_1997.jpeg" alt="Burton Custom 1997" title="Burton Custom 1997">
            <h3>Burton Custom - 1997</h3>
        </div>
        <div class="gallery-item" onclick="openLightbox('burton_custom_2003.jpeg', 'Burton Custom 2003')">
            <img src="burton_custom_2003.jpeg" alt="Burton Custom 2003" title="Burton Custom 2003">
            <h3>Burton Custom - 2003</h3>
        </div>
        <div class="gallery-item" onclick="openLightbox('burton_custom_2005.jpeg', 'Burton Custom 2005')">
            <img src="burton_custom_2005.jpeg" alt="Burton Custom 2005" title="Burton Custom 2005">
            <h3>Burton Custom - 2005</h3>
        </div>

        <!-- Sims Section -->
        <div class="gallery-item" onclick="openLightbox('sims_quest_50.jpeg', 'Sims Quest 50 - 1995')">
            <img src="sims_quest_50.jpeg" alt="Sims Quest 50" title="Sims Quest 50 - 1995">
            <h3>Sims Quest 50 - 1995</h3>
        </div>
        <div class="gallery-item" onclick="openLightbox('sims_search_61.jpeg', 'Sims Search 61 - 1997')">
            <img src="sims_search_61.jpeg" alt="Sims Search 61" title="Sims Search 61 - 1997">
            <h3>Sims Search 61 - 1997</h3>
        </div>
        <div class="gallery-item" onclick="openLightbox('sims_descender_57.jpeg', 'Sims Descender 57 - 1998')">
            <img src="sims_descender_57.jpeg" alt="Sims Descender 57" title="Sims Descender 57 - 1998">
            <h3>Sims Descender 57 - 1998</h3>
        </div>
        <div class="gallery-item" onclick="openLightbox('sims_fs600.jpeg', 'Sims FS600 - 2001')">
            <img src="sims_fs600.jpeg" alt="Sims FS600" title="Sims FS600 - 2001">
            <h3>Sims FS600 - 2001</h3>
        </div>
        <div class="gallery-item" onclick="openLightbox('sims_infinity_157.jpeg', 'Sims Infinity 157 - 2003')">
            <img src="sims_infinity_157.jpeg" alt="Sims Infinity 157" title="Sims Infinity 157 - 2003">
            <h3>Sims Infinity 157 - 2003</h3>
        </div>
        <div class="gallery-item" onclick="openLightbox('sims_solace_144.jpeg', 'Sims Solace 144 - 2006')">
            <img src="sims_solace_144.jpeg" alt="Sims Solace 144" title="Sims Solace 144 - 2006">
            <h3>Sims Solace 144 - 2006</h3>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <span class="close" onclick="closeLightbox()">&times;</span>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="">
            <div id="lightbox-title" class="lightbox-title"></div>
        </div>
    </div>

    <script>
        // Function to open the lightbox with the clicked image and title
        function openLightbox(imageSrc, title) {
            document.getElementById("lightbox-img").src = imageSrc;
            document.getElementById("lightbox-title").innerText = title;
            document.getElementById("lightbox").style.display = "block";
        }

        // Function to close the lightbox
