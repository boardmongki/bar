<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snowboard 1990s - 2000s</title>
    <style>
        /* Global Styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            color: #333;
        }

        h1 {
            text-align: center;
            padding: 20px;
            background-color: #3e8e41;
            color: white;
            margin: 0;
            font-size: 2.5em;
            letter-spacing: 1px;
        }

        h3 {
            font-size: 1.2em;
            text-align: center;
            margin: 10px 0;
        }

        table {
            width: 100%;
            margin: 20px 0;
            border-collapse: collapse;
        }

        td {
            text-align: center;
            vertical-align: top;
            padding: 10px;
            width: 20%;
        }

        img {
            width: 100%;
            height: auto;
            max-width: 220px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
            cursor: pointer;
        }

        img:hover {
            transform: scale(1.05);
        }

        /* Popup Styles */
        .modal {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0,0,0); /* Black with opacity */
            background-color: rgba(0,0,0,0.4);
            padding-top: 60px;
        }

        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 400px;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            td {
                width: 50%;
            }

            img {
                max-width: 180px;
            }

            h1 {
                font-size: 2em;
            }
        }

        @media (max-width: 480px) {
            td {
                width: 100%;
            }

            img {
                max-width: 100%;
            }

            h1 {
                font-size: 1.8em;
            }
        }

        /* Add some spacing between rows */
        tr:not(:last-child) {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <h1>Snowboard 1990s - 2000s</h1>

    <table>
        <!-- Burton Section -->
        <tr>
            <td><img src="burton_air_5_1.jpeg" alt="Burton Air 5.1" title="Burton Air 5.1 - 1992" onclick="openModal('Burton Air 5.1 - 1992')"><h3>Burton Air 5.1 - 1992</h3></td>
            <td><img src="burton_air_asym_6.jpeg" alt="Burton Air Asym 6" title="Burton Air Asym 6 - 1994" onclick="openModal('Burton Air Asym 6 - 1994')"><h3>Burton Air Asym 6 - 1994</h3></td>
            <td><img src="burton_custom_1997.jpeg" alt="Burton Custom 1997" title="Burton Custom 1997" onclick="openModal('Burton Custom 1997')"><h3>Burton Custom - 1997</h3></td>
            <td><img src="burton_custom_2003.jpeg" alt="Burton Custom 2003" title="Burton Custom 2003" onclick="openModal('Burton Custom 2003')"><h3>Burton Custom - 2003</h3></td>
            <td><img src="burton_custom_2005.jpeg" alt="Burton Custom 2005" title="Burton Custom 2005" onclick="openModal('Burton Custom 2005')"><h3>Burton Custom - 2005</h3></td>
        </tr>

        <!-- Sims Section -->
        <tr>
            <td><img src="sims_quest_50.jpeg" alt="Sims Quest 50" title="Sims Quest 50 - 1995" onclick="openModal('Sims Quest 50 - 1995')"><h3>Sims Quest 50 - 1995</h3></td>
            <td><img src="sims_search_61.jpeg" alt="Sims Search 61" title="Sims Search 61 - 1997" onclick="openModal('Sims Search 61 - 1997')"><h3>Sims Search 61 - 1997</h3></td>
            <td><img src="sims_descender_57.jpeg" alt="Sims Descender 57" title="Sims Descender 57 - 1998" onclick="openModal('Sims Descender 57 - 1998')"><h3>Sims Descender 57 - 1998</h3></td>
            <td><img src="sims_fs600.jpeg" alt="Sims FS600" title="Sims FS600 - 2001" onclick="openModal('Sims FS600 - 2001')"><h3>Sims FS600 - 2001</h3></td>
            <td><img src="sims_infinity_157.jpeg" alt="Sims Infinity 157" title="Sims Infinity 157 - 2003" onclick="openModal('Sims Infinity 157 - 2003')"><h3>Sims Infinity 157 - 2003</h3></td>
            <td><img src="sims_solace_144.jpeg" alt="Sims Solace 144" title="Sims Solace 144 - 2006" onclick="openModal('Sims Solace 144 - 2006')"><h3>Sims Solace 144 - 2006</h3></td>
        </tr>

        <!-- More sections (K2, LibTech, etc.) go here, with similar structure -->
        
    </table>

    <!-- The Modal -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <p id="modalTitle"></p>
        </div>
    </div>

    <script>
        // Function to open modal
        function openModal(title) {
            document.getElementById("modalTitle").innerText = title;
            document.getElementById("myModal").style.display = "block";
        }

        // Function to close modal
        function closeModal() {
            document.getElementById("myModal").style.display = "none";
        }

        // Close modal if the user clicks outside of it
        window.onclick = function(event) {
            if (event.target == document.getElementById("myModal")) {
                closeModal();
            }
        }
    </script>

</body>
</html>
